<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- CSP는 main.js에서 동적으로 주입 -->
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <!-- Server setup (첫 실행) -->
  <div id="setup-view" hidden>
    <div style="font-size:11px;opacity:.6;margin-bottom:4px;">서버 주소</div>
    <input id="server-input" placeholder="http://192.168.x.x:2228" />
    <button id="setup-btn">연결</button>
  </div>

  <!-- Login -->
  <div id="login-view" hidden>
    <input id="username-input" placeholder="사용자명" />
    <button id="login-btn">시작</button>
  </div>

  <!-- Calibration -->
  <div id="calib-view" hidden>
    <div id="calib-msg">캘리브레이션</div>
    <div id="calib-count"></div>
    <video id="calib-video" autoplay playsinline muted></video>
    <button id="calib-start-btn">시작</button>
  </div>

  <!-- Widget -->
  <div id="widget-view" hidden>
    <video id="video" autoplay playsinline muted hidden></video>
    <canvas id="canvas" hidden></canvas>
    <div id="emoji">😐</div>
    <div id="break-timer" hidden></div>
    <button id="menu-btn">⚙</button>
  </div>

  <!-- Break settings modal -->
  <div id="break-modal" hidden>
    <label>작업 <select id="work-min"><option>25</option><option selected>50</option><option>90</option></select>분</label>
    <label>휴식 <select id="break-min"><option>5</option><option selected>10</option><option>15</option></select>분</label>
    <button id="save-settings">저장</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.17.0/dist/tf-converter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <script type="module" src="widget.js"></script>
</body>
</html>
